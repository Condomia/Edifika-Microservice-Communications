spring.application.name=communication

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/communication_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=${PORT:8083}

# JWT (mismo secret que IAM)
jwt.secret=${JWT_SECRET:edifika-secret-key-must-be-at-least-32-characters-long}
jwt.expiration.days=${JWT_EXPIRATION_DAYS:365}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html